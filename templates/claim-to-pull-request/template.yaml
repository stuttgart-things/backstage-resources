---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: claim-to-pull-request
  title: Create Resource claims
  description: Create a GitHub Pull Request with rendered claim manifests (supports single or multiple claims)
  tags:
    - crossplane
    - kubernetes
    - infrastructure
    - gitops
    - claims
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Resource Claims
      description: Select one or more claim templates and configure parameters for each
      required:
        - claims
        - category
      properties:
        claims:
          title: Claims
          type: string
          description: Select templates and configure parameters for each claim
          ui:field: ClaimMachineryMultiClaim

        category:
          title: Category
          type: string
          description: Category for the claim resources
          enum:
            - infra
            - apps
            - other-resources

        mode:
          title: Commit Mode
          type: string
          description: "flux: dedicated folders with kustomization + catalog-info; onlyManifest: just the rendered YAML files"
          default: flux
          enum:
            - flux
            - onlyManifest
          enumNames:
            - Flux (kustomization + catalog-info)
            - Only Manifests

    - title: Target Repository
      description: Select the repository and path where claim manifests will be committed
      required:
        - repository
      properties:
        repository:
          title: Repository
          type: string
          description: GitHub repository for the claim PR
          enum:
            - stuttgart-things/harvester
            - stuttgart-things/stuttgart-things
          default: stuttgart-things/harvester
      dependencies:
        repository:
          oneOf:
            - properties:
                repository:
                  enum:
                    - stuttgart-things/harvester
                basePath:
                  title: Base Path
                  type: string
                  description: Base folder for claims in the repository
                  default: claims
                  enum:
                    - claims
            - properties:
                repository:
                  enum:
                    - stuttgart-things/stuttgart-things
                basePath:
                  title: Base Path
                  type: string
                  description: "Base folder for claims (e.g. clusters/labul/vsphere/claims)"
                  default: clusters/<LAB>/<CLOUD>/claims

  steps:
    - id: render-claims
      name: Render Claims and Create PR
      action: claim-machinery:render-multiple
      input:
        claims: ${{ parameters.claims }}
        repository: ${{ parameters.repository }}
        basePath: ${{ parameters.basePath }}
        claimCategory: ${{ parameters.category }}
        targetBranch: main
        mode: ${{ parameters.mode }}
        catalogOwner: platform-team

    - id: log-summary
      name: Summary
      action: debug:log
      input:
        message: |
          Pull request created successfully!
          PR URL: ${{ steps['render-claims'].output.pullRequestUrl }}

          Combined manifest:
          ${{ steps['render-claims'].output.manifest }}

  output:
    links:
      - title: GitHub Pull Request
        icon: github
        url: ${{ steps['render-claims'].output.pullRequestUrl }}
    text:
      - title: Pull Request Created
        content: |
          A pull request has been created at:
          ${{ steps['render-claims'].output.pullRequestUrl }}

          Branch: `${{ steps['render-claims'].output.branchName }}`
      - title: Rendered Manifests
        content: |
          ```yaml
          ${{ steps['render-claims'].output.manifest }}
          ```
      - title: Next Steps
        content: |
          1. Review the pull request in GitHub
          2. Merge the PR to add the claim(s) to the repository
          3. The catalog components will be available after merge
          4. Claims will be reconciled by the cluster controller
