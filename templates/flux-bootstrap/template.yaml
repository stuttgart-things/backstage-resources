---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: flux-bootstrap
  title: Flux Bootstrap / Check / Destroy
  description: Bootstrap, check, or destroy Flux on a Kubernetes cluster via Dagger
  tags:
    - flux
    - kubernetes
    - gitops
    - dagger
    - infrastructure
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Action
      required:
        - action
      properties:
        action:
          title: Action
          type: string
          description: Select the operation to perform
          enum:
            - bootstrap
            - check
            - destroy
          enumNames:
            - Bootstrap Flux (deploy operator + config)
            - Check Flux Status (verify cluster)
            - Destroy Flux (tear down for re-testing)
          default: check

    - title: Cluster Configuration
      required:
        - source_repo
        - kube_config
      properties:
        source_repo:
          title: Source Repository
          type: string
          description: Repository containing the SOPS-encrypted kubeconfig
          enum:
            - stuttgart-things/harvester
            - stuttgart-things/stuttgart-things
          default: stuttgart-things/stuttgart-things
      dependencies:
        source_repo:
          oneOf:
            - properties:
                source_repo:
                  enum:
                    - stuttgart-things/harvester
                kube_config:
                  title: Kubeconfig
                  type: string
                  description: SOPS-encrypted kubeconfig in the repository
                  enum:
                    - secrets/infra.sthings.lab.yaml
                  enumNames:
                    - infra.sthings.lab
            - properties:
                source_repo:
                  enum:
                    - stuttgart-things/stuttgart-things
                kube_config:
                  title: Kubeconfig
                  type: string
                  description: SOPS-encrypted kubeconfig in the repository
                  default: secrets/kubeconfigs/<CLUSTER-NAME>.yaml

    - title: Bootstrap Configuration
      description: Only required for the bootstrap action
      dependencies:
        action:
          oneOf:
            - properties:
                action:
                  enum:
                    - check
            - properties:
                action:
                  enum:
                    - destroy
            - properties:
                action:
                  enum:
                    - bootstrap
                repository:
                  title: Target Repository
                  type: string
                  description: Repository where Flux config will be committed (owner/repo)
                  default: stuttgart-things/harvester
                  enum:
                    - stuttgart-things/harvester
                    - stuttgart-things/stuttgart-things
                operator_version:
                  title: Flux Operator Version
                  type: string
                  description: Version of the Flux operator to deploy
                  default: "0.47.0"
                  enum:
                    - "0.47.0"
                    - "0.42.1"
              dependencies:
                repository:
                  oneOf:
                    - properties:
                        repository:
                          enum:
                            - stuttgart-things/harvester
                        destination_path:
                          title: Destination Path
                          type: string
                          description: "Path in the target repository for Flux config (e.g. clusters/<CLUSTER-NAME>)"
                          default: clusters/<CLUSTER-NAME>
                    - properties:
                        repository:
                          enum:
                            - stuttgart-things/stuttgart-things
                        destination_path:
                          title: Destination Path
                          type: string
                          description: "Path in the target repository for Flux config (e.g. clusters/labul/vsphere/sthings-infra)"
                          default: clusters/labul/vsphere/<CLUSTER-NAME>

    - title: Runner Configuration
      description: Optional - select the self-hosted GitHub runner for the workflow
      properties:
        runs_on:
          title: Runner
          type: string
          description: GitHub Actions runner label to execute the workflow on
          enum:
            - dagger-labda
            - dagger-labul
          default: dagger-labda

  steps:
    - id: dispatch-bootstrap
      name: Trigger Flux Bootstrap
      if: ${{ parameters.action === "bootstrap" }}
      action: github:actions:dispatch
      input:
        workflowId: dispatch-flux-bootstrap.yaml
        repoUrl: github.com?repo=stuttgart-things&owner=stuttgart-things
        branchOrTagName: main
        workflowInputs:
          source-repo: ${{ parameters.source_repo }}
          kube-config: ${{ parameters.kube_config }}
          repository: ${{ parameters.repository }}
          destination-path: ${{ parameters.destination_path }}
          operator-version: ${{ parameters.operator_version }}
          runs-on: ${{ parameters.runs_on }}

    - id: dispatch-check
      name: Trigger Flux Check
      if: ${{ parameters.action === "check" }}
      action: github:actions:dispatch
      input:
        workflowId: dispatch-flux-check.yaml
        repoUrl: github.com?repo=stuttgart-things&owner=stuttgart-things
        branchOrTagName: main
        workflowInputs:
          source-repo: ${{ parameters.source_repo }}
          kube-config: ${{ parameters.kube_config }}
          runs-on: ${{ parameters.runs_on }}

    - id: dispatch-destroy
      name: Trigger Flux Destroy
      if: ${{ parameters.action === "destroy" }}
      action: github:actions:dispatch
      input:
        workflowId: dispatch-flux-destroy.yaml
        repoUrl: github.com?repo=stuttgart-things&owner=stuttgart-things
        branchOrTagName: main
        workflowInputs:
          source-repo: ${{ parameters.source_repo }}
          kube-config: ${{ parameters.kube_config }}
          runs-on: ${{ parameters.runs_on }}

  output:
    links:
      - title: View GitHub Actions
        icon: github
        url: https://github.com/stuttgart-things/stuttgart-things/actions
    text:
      - title: Workflow Dispatched
        content: |
          **Action**: ${{ parameters.action }}
          **Source Repo**: ${{ parameters.source_repo }}
          **Kubeconfig**: ${{ parameters.kube_config }}

          The workflow has been dispatched. Check GitHub Actions for progress.
