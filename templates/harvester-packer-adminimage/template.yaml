apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: harvester-packer-adminimage
  title: Curate Harvester Golden Image (Admin)
  description: >-
    Curate the trusted golden base image — its users, packages and (optional)
    CIS hardening. Opens a review-gated DRAFT PR (no auto-merge); a platform admin
    reviews and merges. For platform admins.
  tags:
    - harvester
    - packer
    - golden
    - hardening
    - admin
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Golden Base Image
      properties:
        baseImage:
          title: Golden Base Image
          type: string
          description: Which golden base image to curate
          enum:
            - ubuntu26
          enumNames:
            - 🟠 Ubuntu 26.04 LTS (sthings-u26)
          default: ubuntu26

    - title: Hardening
      description: |
        Optional CIS Benchmark profile + security tooling baked into the golden
        image. The image's existing packages/users are preserved and merged.
        NOTE: CIS profile enforcement is not yet wired into the build pipeline
        (tracked in issue #93); the security tooling packages ARE installed.
      properties:
        cisProfile:
          title: CIS Hardening Profile
          type: string
          description: CIS Benchmark profile recorded for the build pipeline
          enum:
            - none
            - cis-level1-server
            - cis-level2-server
          enumNames:
            - ⚪ None
            - 🛡️ CIS Level 1 – Server (baseline hardening)
            - 🛡️ CIS Level 2 – Server (defense-in-depth)
          default: none
        securityTooling:
          title: Security Tooling
          type: array
          description: >-
            Hardening / monitoring packages baked into the image
            (merged & de-duplicated with the base package list).
          default: []
          items:
            type: string
          ui:options:
            addable: true
            orderable: false
            removable: true

    - title: Add New Users
      description: |
        Existing golden users will be preserved.
      properties:
        users:
          title: Add New Users
          type: array
          description: New users to add to the golden image (existing users are preserved)
          ui:help: "View users at: https://github.com/stuttgart-things/harvester/tree/main/packer/golden/"
          default: []
          items:
            type: object
            required: [name, ssh_authorized_keys]
            properties:
              name:
                title: Username
                type: string
              groups:
                title: Groups
                type: string
                default: sudo
              shell:
                title: Shell
                type: string
                default: /bin/bash
              sudo:
                title: Sudo rule
                type: string
                default: "ALL=(ALL) NOPASSWD:ALL" # pragma: allowlist secret
              ssh_authorized_keys:
                title: SSH Public Keys
                type: array
                description: SSH public keys for authorized access
                items:
                  type: string
                minItems: 1
          ui:options:
            addable: true
            orderable: false
            removable: true

    - title: Additional Packages
      description: |
        Existing golden packages will be preserved.
      properties:
        packages:
          title: Additional Packages
          type: array
          description: New packages to add to the golden image (existing packages are preserved)
          ui:help: "View packages at: https://github.com/stuttgart-things/harvester/tree/main/packer/golden/"
          default: []
          items:
            type: string
          ui:options:
            addable: true
            orderable: false
            removable: true

  steps:
    - id: resolve-target
      name: Resolve Golden Target
      action: roadiehq:utils:jsonata
      input:
        data:
          baseImage: ${{ parameters.baseImage }}
          # baseImage -> golden image / folder name
          goldenMap:
            ubuntu26: sthings-u26
        expression: "$lookup(goldenMap, baseImage)"

    - id: fetch-existing-packages
      name: Fetch Existing Packages (golden)
      action: fetch:plain:file
      input:
        url: https://github.com/stuttgart-things/harvester/blob/main/packer/golden/${{ steps['resolve-target'].output.result }}/packages.yaml
        targetPath: ./packages-existing.yaml

    - id: parse-existing-packages
      name: Parse Existing Packages
      action: utils:yaml:parse
      input:
        filePath: ./packages-existing.yaml

    - id: combine-packages
      name: Merge & Deduplicate Packages
      action: roadiehq:utils:jsonata
      input:
        data:
          existing: ${{ steps['parse-existing-packages'].output.content.packages | default([]) }}
          tooling: ${{ parameters.securityTooling | default([]) }}
          new: ${{ parameters.packages | default([]) }}
        # base packages + security tooling + admin additions, de-duplicated
        expression: "$distinct($append($append(existing, tooling), new))"

    - id: render-packages
      name: Render Complete Packages File
      action: fetch:template:file
      input:
        url: ./template/packages.yaml
        targetPath: ./packages.yaml
        values:
          packages: ${{ steps['combine-packages'].output.result | default([]) }}

    - id: fetch-existing-users
      name: Fetch Existing Users (golden)
      action: fetch:plain:file
      input:
        url: https://github.com/stuttgart-things/harvester/blob/main/packer/golden/${{ steps['resolve-target'].output.result }}/users.yaml
        targetPath: ./users-existing.yaml

    - id: parse-existing-users
      name: Parse Existing Users
      action: utils:yaml:parse
      input:
        filePath: ./users-existing.yaml

    - id: combine-users
      name: Merge & Deduplicate Users
      action: roadiehq:utils:jsonata
      input:
        data:
          existing: ${{ steps['parse-existing-users'].output.content.users | default([]) }}
          new: ${{ parameters.users | default([]) }}
        # Keep existing users whose name is NOT re-submitted, then append the
        # new ones — so a re-submitted username updates instead of duplicating.
        expression: "$append(existing[$not(name in new.name)], new)"

    - id: render-users
      name: Render Complete Users File
      action: fetch:template:file
      input:
        url: ./template/users-additions.yaml
        targetPath: ./users.yaml
        values:
          users: ${{ steps['combine-users'].output.result | default([]) }}

    - id: render-hardening
      name: Render Hardening Config
      if: ${{ parameters.cisProfile != "none" or (parameters.securityTooling | length > 0) }}
      action: fetch:template:file
      input:
        url: ./template/hardening.yaml
        targetPath: ./hardening.yaml
        values:
          cisProfile: ${{ parameters.cisProfile }}
          tooling: ${{ parameters.securityTooling | default([]) }}

    - id: render-catalog
      name: Render Catalog Info
      action: fetch:template:file
      input:
        url: ./template/catalog-info.yaml
        targetPath: ./catalog-info.yaml
        values:
          users: ${{ parameters.users }}
          packages: ${{ parameters.packages }}
          tooling: ${{ parameters.securityTooling | default([]) }}
          cisProfile: ${{ parameters.cisProfile }}
          baseImage: ${{ parameters.baseImage }}
          targetName: ${{ steps['resolve-target'].output.result }}

    - id: create-pull-request
      name: Create Pull Request (review-gated draft)
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=stuttgart-things&repo=harvester
        branchName: backstage/golden-${{ steps['resolve-target'].output.result }}-${{ user.entity.metadata.name | default('anon') }}-config
        draft: true
        update: true
        title: "[GOLDEN] Curate ${{ steps['resolve-target'].output.result }} (${{ parameters.cisProfile }})"
        description: |
          ## 🛡️ Golden Image Curation — ${{ steps['resolve-target'].output.result }}

          | Field | Value |
          |-------|-------|
          | **Target** | `${{ steps['resolve-target'].output.result }}` |
          | **Base Image** | `${{ parameters.baseImage }}` |
          | **CIS Profile** | `${{ parameters.cisProfile }}` |

          Generated via the Backstage **admin** golden-curation template.

          > ⚠️ **Review-gated:** opened as a **draft** and must NOT be auto-merged.
          > A platform admin reviews the change and merges manually. On merge the
          > golden image is rebuilt and uploaded to Harvester.
          >
          > ℹ️ CIS profile enforcement is not yet wired into the build (issue #93);
          > security-tooling packages are installed via the merged package list.
        targetPath: packer/golden/${{ steps['resolve-target'].output.result }}

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/stuttgart-things/harvester/blob/main/packer/golden/${{ steps['resolve-target'].output.result }}/catalog-info.yaml
        optional: true

  output:
    links:
      - title: Pull Request (draft — needs review)
        icon: github
        url: ${{ steps['create-pull-request'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: Next Steps
        content: |
          Draft PR created at ${{ steps['create-pull-request'].output.remoteUrl }}

          1. A platform admin reviews the golden config (users / packages / hardening).
          2. Mark the PR ready & merge — the Packer build runs and uploads the
             `${{ steps['resolve-target'].output.result }}` golden image to Harvester.
          3. Dev images layered on this golden pick up the change on their next build.
      - title: Golden Image Preview
        content: | #pragma: allowlist secret
          ## Catalog Entity

          | Field | Value |
          |-------|-------|
          | **Name** | ${{ steps['resolve-target'].output.result }}-packer-image |
          | **Kind** | Resource |
          | **Type** | packer-image-golden |
          | **Lifecycle** | production |
          | **CIS Profile** | ${{ parameters.cisProfile }} |
          | **Owner** | platform-team |
          | **Base Image** | ${{ parameters.baseImage }} |

          ## Security Tooling

          ${{ 'No tooling selected.' if not parameters.securityTooling else '' }}
          {%- if parameters.securityTooling %}
          | # | Package |
          |---|---------|
          {%- for tool in parameters.securityTooling %}
          | ${{ loop.index }} | `${{ tool }}` |
          {%- endfor %}
          {%- endif %}

          ## Users

          ${{ 'No new users added.' if not parameters.users else '' }}
          {%- for user in parameters.users %}
          ### ${{ user.name }}

          | Setting | Value |
          |---------|-------|
          | **Groups** | ${{ user.groups or 'sudo' }} |
          | **Shell** | ${{ user.shell or '/bin/bash' }} |
          | **SSH Keys** | ${{ user.ssh_authorized_keys | length }} key(s) |
          {%- endfor %}

          ## Additional Packages

          ${{ 'No extra packages added.' if not parameters.packages else '' }}
          {%- if parameters.packages %}
          | # | Package |
          |---|---------|
          {%- for pkg in parameters.packages %}
          | ${{ loop.index }} | `${{ pkg }}` |
          {%- endfor %}
          {%- endif %}
