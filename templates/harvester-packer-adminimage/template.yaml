apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: harvester-packer-adminimage
  title: Curate Hardened Golden Harvester Image (Admin)
  description: >-
    Curate a golden Packer base image: pick a CIS hardening profile and security
    tooling, merge them into the golden image's package/user set, and open a
    review-gated (draft) PR against the golden dir — no auto-merge. For platform
    admins.
  tags:
    - harvester
    - packer
    - infrastructure
    - hardening
    - admin
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Golden Base Image
      properties:
        baseImage:
          title: Golden Image
          type: string
          description: Select the curated golden base image to harden
          enum:
            - ubuntu26
            - rocky
            - leap
          enumNames:
            - 🟠 Ubuntu 26.04 LTS (golden sthings-u26)
            - 🪨 Rocky Linux 9 (golden sthings-rocky9)
            - 🦎 openSUSE Leap 15.6 (golden sthings-leap)
          default: ubuntu26

    - title: Hardening
      description: |
        Apply a CIS Benchmark profile and bake in security tooling. The golden
        image's existing packages/users are preserved and merged.
      properties:
        cisProfile:
          title: CIS Hardening Profile
          type: string
          description: CIS Benchmark profile recorded for the golden image
          enum:
            - cis-level1-server
            - cis-level2-server
          enumNames:
            - 🛡️ CIS Level 1 – Server (baseline hardening)
            - 🛡️ CIS Level 2 – Server (defense-in-depth)
          default: cis-level1-server
        securityTooling:
          title: Security Tooling
          type: array
          description: >-
            Hardening / monitoring packages baked into the golden image
            (merged & de-duplicated with the existing package list).
          default:
            - auditd
            - aide
            - fail2ban
            - unattended-upgrades
          items:
            type: string
          ui:options:
            addable: true
            orderable: false
            removable: true

    - title: Add New Users
      description: |
        Existing users on the golden image will be preserved.
      properties:
        users:
          title: Add New Users
          type: array
          description: >-
            Optional — leave empty to change nothing. New users to add to the
            image (existing users are preserved).
            [Browse current golden images](https://github.com/stuttgart-things/harvester/tree/main/packer/golden).
          default: []
          items:
            type: object
            required: [name, ssh_authorized_keys]
            properties:
              name:
                title: Username
                type: string
              groups:
                title: Groups
                type: string
                default: sudo
              shell:
                title: Shell
                type: string
                default: /bin/bash
              sudo:
                title: Sudo rule
                type: string
                default: "ALL=(ALL) NOPASSWD:ALL" # pragma: allowlist secret
              ssh_authorized_keys:
                title: SSH Public Keys
                type: array
                description: SSH public keys for authorized access
                items:
                  type: string
                minItems: 1
          ui:options:
            addable: true
            orderable: false
            removable: true

    - title: Additional Packages
      description: |
        Existing packages on the golden image will be preserved.
      properties:
        packages:
          title: Additional Packages
          type: array
          description: >-
            Optional — leave empty to change nothing. New packages to add to the
            image (existing packages are preserved).
            [Browse current golden images](https://github.com/stuttgart-things/harvester/tree/main/packer/golden).
          default: []
          items:
            type: string
          ui:options:
            addable: true
            orderable: false
            removable: true

  steps:
    - id: resolve-names
      name: Resolve Golden Image Name
      action: roadiehq:utils:jsonata
      input:
        data:
          baseImage: ${{ parameters.baseImage }}
          golden:
            ubuntu26: sthings-u26
            rocky: sthings-rocky9
            leap: sthings-leap
          distroTags:
            ubuntu26: [ubuntu26]
            rocky: [rocky]
            leap: [opensuse, leap]
          profileBase:
            ubuntu26: ubuntu26
            rocky: rocky9
            leap: leap15
        expression: |
          {
            "goldenName": $lookup(golden, baseImage),
            "distroTags": $lookup(distroTags, baseImage),
            "profileBase": $lookup(profileBase, baseImage)
          }

    - id: fetch-existing-packages
      name: Fetch Existing Packages (from golden image)
      action: fetch:plain:file
      input:
        url: https://github.com/stuttgart-things/harvester/blob/main/packer/golden/${{ steps['resolve-names'].output.result.goldenName }}/packages.yaml
        targetPath: ./packages-existing.yaml

    - id: parse-existing-packages
      name: Parse Existing Packages
      action: utils:yaml:parse
      input:
        filePath: ./packages-existing.yaml

    - id: combine-packages
      name: Merge & Deduplicate Packages
      action: roadiehq:utils:jsonata
      input:
        data:
          existing: ${{ steps['parse-existing-packages'].output.content.packages | default([]) }}
          tooling: ${{ parameters.securityTooling | default([]) }}
          new: ${{ parameters.packages | default([]) }}
        # golden packages + security tooling + admin additions, de-duplicated
        expression: "$distinct($append($append(existing, tooling), new))"

    - id: render-packages
      name: Render Complete Packages File
      action: fetch:template:file
      input:
        url: ./template/packages.yaml
        targetPath: ./packages.yaml
        values:
          packages: ${{ steps['combine-packages'].output.result | default([]) }}

    - id: fetch-existing-users
      name: Fetch Existing Users (from golden image)
      action: fetch:plain:file
      input:
        url: https://github.com/stuttgart-things/harvester/blob/main/packer/golden/${{ steps['resolve-names'].output.result.goldenName }}/users.yaml
        targetPath: ./users-existing.yaml

    - id: parse-existing-users
      name: Parse Existing Users
      action: utils:yaml:parse
      input:
        filePath: ./users-existing.yaml

    - id: combine-users
      name: Merge & Deduplicate Users
      action: roadiehq:utils:jsonata
      input:
        data:
          existing: ${{ steps['parse-existing-users'].output.content.users | default([]) }}
          new: ${{ parameters.users | default([]) }}
        # Keep existing users whose name is NOT re-submitted, then append the
        # new ones — so a re-submitted username updates instead of duplicating.
        expression: "$append(existing[$not(name in new.name)], new)"

    - id: render-users
      name: Render Complete Users File
      action: fetch:template:file
      input:
        url: ./template/users-additions.yaml
        targetPath: ./users.yaml
        values:
          users: ${{ steps['combine-users'].output.result | default([]) }}

    - id: render-catalog
      name: Render Catalog Info
      action: fetch:template:file
      input:
        url: ./template/catalog-info.yaml
        targetPath: ./catalog-info.yaml
        values:
          users: ${{ parameters.users }}
          packages: ${{ parameters.packages }}
          tooling: ${{ parameters.securityTooling | default([]) }}
          cisProfile: ${{ parameters.cisProfile }}
          goldenName: ${{ steps['resolve-names'].output.result.goldenName }}
          distroTags: ${{ steps['resolve-names'].output.result.distroTags }}
          profileBase: ${{ steps['resolve-names'].output.result.profileBase }}

    - id: create-pull-request
      name: Create Pull Request (review-gated draft)
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=stuttgart-things&repo=harvester
        branchName: backstage/golden-${{ steps['resolve-names'].output.result.goldenName }}-${{ user.entity.metadata.name | default('anon') }}-config
        draft: true
        update: true
        title: "[golden] harden ${{ steps['resolve-names'].output.result.goldenName }} (${{ parameters.cisProfile }})"
        description: |
          ## 🛡️ Hardened Golden Image — ${{ steps['resolve-names'].output.result.goldenName }}

          | Field | Value |
          |-------|-------|
          | **Golden image** | `${{ steps['resolve-names'].output.result.goldenName }}` |
          | **Base** | `${{ parameters.baseImage }}` |
          | **CIS Profile** | `${{ parameters.cisProfile }}` |

          Generated via the Backstage **admin** hardening template.

          > ⚠️ **Review-gated:** golden images are not auto-merged. This PR is
          > opened as a **draft**; a platform admin reviews the change and merges
          > manually. After merge to `main`, `packer-build.yml` rebuilds the
          > golden image, uploads it to Harvester, and republishes the base to S3.
        targetPath: packer/golden/${{ steps['resolve-names'].output.result.goldenName }}

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/stuttgart-things/harvester/blob/main/packer/golden/${{ steps['resolve-names'].output.result.goldenName }}/catalog-info.yaml
        optional: true

  output:
    links:
      - title: Pull Request (draft — needs review)
        icon: github
        url: ${{ steps['create-pull-request'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: Next Steps
        content: |
          Draft PR created at ${{ steps['create-pull-request'].output.remoteUrl }}

          1. A platform admin reviews the golden image change.
          2. Mark the PR ready & merge. The PR build (`packer-pr-build.yml`) is
             validation-only for golden — no upload, no auto-merge.
          3. After merge to `main`, `packer-build.yml` rebuilds the
             `${{ steps['resolve-names'].output.result.goldenName }}` golden image,
             uploads it to Harvester, and republishes the base to S3 so dev images
             can layer on it.
      - title: Hardened Golden Image Preview
        content: | #pragma: allowlist secret
          ## Catalog Entity

          | Field | Value |
          |-------|-------|
          | **Name** | ${{ steps['resolve-names'].output.result.goldenName }}-packer-image |
          | **Kind** | Resource |
          | **Type** | packer-image-golden |
          | **Lifecycle** | production |
          | **CIS Profile** | ${{ parameters.cisProfile }} |
          | **Owner** | platform-team |
          | **Base Image** | ${{ parameters.baseImage }} |

          ## Security Tooling

          ${{ 'No tooling selected.' if not parameters.securityTooling else '' }}
          {%- if parameters.securityTooling %}
          | # | Package |
          |---|---------|
          {%- for tool in parameters.securityTooling %}
          | ${{ loop.index }} | `${{ tool }}` |
          {%- endfor %}
          {%- endif %}

          ## Users

          ${{ 'No new users added.' if not parameters.users else '' }}
          {%- for user in parameters.users %}
          ### ${{ user.name }}

          | Setting | Value |
          |---------|-------|
          | **Groups** | ${{ user.groups or 'sudo' }} |
          | **Shell** | ${{ user.shell or '/bin/bash' }} |
          | **SSH Keys** | ${{ user.ssh_authorized_keys | length }} key(s) |
          {%- endfor %}

          ## Additional Packages

          ${{ 'No extra packages added.' if not parameters.packages else '' }}
          {%- if parameters.packages %}
          | # | Package |
          |---|---------|
          {%- for pkg in parameters.packages %}
          | ${{ loop.index }} | `${{ pkg }}` |
          {%- endfor %}
          {%- endif %}
