---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: ${{ values.goldenName }}-packer-image
  description: ${{ values.goldenName }} golden (curated, review-gated) Packer base image for Harvester, hardened with ${{ values.cisProfile }}
  annotations:
    github.com/project-slug: stuttgart-things/harvester
  tags:
    - harvester
    - packer
    - golden
    - hardened
{%- for tag in values.distroTags %}
    - ${{ tag }}
{%- endfor %}
    - ${{ values.cisProfile }}
{%- if values.users | length > 0 %}
    - users-customized
{%- endif %}
{%- if values.packages | length > 0 %}
    - packages-customized
{%- endif %}
spec:
  type: packer-image-golden
  lifecycle: production
  owner: platform-team
  dependsOn: []
  profile:
    baseImage: ${{ values.profileBase }}
    cisProfile: ${{ values.cisProfile }}
{%- if values.tooling | length > 0 %}
    securityTooling:
{%- for tool in values.tooling %}
      - ${{ tool }}
{%- endfor %}
{%- endif %}
{%- if values.users | length > 0 %}
    addedUsers:
{%- for user in values.users %}
      - ${{ user.name }}
{%- endfor %}
{%- endif %}
{%- if values.packages | length > 0 %}
    addedPackages:
{%- for pkg in values.packages %}
      - ${{ pkg }}
{%- endfor %}
{%- endif %}
