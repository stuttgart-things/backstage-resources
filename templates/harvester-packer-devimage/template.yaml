apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: harvester-packer-devimage
  title: Create Harvester Dev Image
  description: >-
    Self-service playground image. Add your SSH key and the packages you need to a
    dev image (layered on the curated golden base) — opens an auto-merging PR that
    builds and uploads to Harvester. No review gate.
  tags:
    - harvester
    - packer
    - dev
    - playground
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Base Image
      properties:
        baseImage:
          title: Base Image
          type: string
          description: >-
            Golden base to layer your dev image on. (Only images with a golden +
            dev pair are listed; add more golden images to extend this list.)
          enum:
            - ubuntu26
          enumNames:
            - 🟠 Ubuntu 26.04 LTS (golden sthings-u26 → dev u26-dev)
          default: ubuntu26

    - title: Add New Users
      description: |
        Add yourself (or others) to the shared dev image. Existing users are
        preserved; re-submitting a username updates it instead of duplicating.
      properties:
        users:
          title: Add New Users
          type: array
          description: New users to add to the dev image (existing users are preserved)
          ui:help: "View users at: https://github.com/stuttgart-things/harvester/tree/main/packer/dev/"
          default: []
          items:
            type: object
            required: [name, ssh_authorized_keys]
            properties:
              name:
                title: Username
                type: string
              groups:
                title: Groups
                type: string
                default: sudo
              shell:
                title: Shell
                type: string
                default: /bin/bash
              sudo:
                title: Sudo rule
                type: string
                default: "ALL=(ALL) NOPASSWD:ALL" # pragma: allowlist secret
              ssh_authorized_keys:
                title: SSH Public Keys
                type: array
                description: SSH public keys for authorized access
                items:
                  type: string
                minItems: 1
          ui:options:
            addable: true
            orderable: false
            removable: true

    - title: Additional Packages
      description: |
        Existing packages on the dev image will be preserved.
      properties:
        packages:
          title: Additional Packages
          type: array
          description: New packages to add to the dev image (existing packages are preserved)
          ui:help: "View packages at: https://github.com/stuttgart-things/harvester/tree/main/packer/dev/"
          default: []
          items:
            type: string
          ui:options:
            addable: true
            orderable: false
            removable: true

  steps:
    - id: resolve-target
      name: Resolve Dev Target
      action: roadiehq:utils:jsonata
      input:
        data:
          baseImage: ${{ parameters.baseImage }}
          # baseImage -> { dev folder/image name, golden base it layers on }
          devMap:
            ubuntu26: u26-dev
          goldenMap:
            ubuntu26: sthings-u26
        # Returns { devName, goldenBase } — referenced as result.devName / result.goldenBase
        expression: "{ 'devName': $lookup(devMap, baseImage), 'goldenBase': $lookup(goldenMap, baseImage) }"

    - id: fetch-existing-packages
      name: Fetch Existing Packages
      action: fetch:plain:file
      input:
        url: https://github.com/stuttgart-things/harvester/blob/main/packer/dev/${{ steps['resolve-target'].output.result.devName }}/packages.yaml
        targetPath: ./packages-existing.yaml

    - id: parse-existing-packages
      name: Parse Existing Packages
      action: utils:yaml:parse
      input:
        filePath: ./packages-existing.yaml

    - id: combine-packages
      name: Merge & Deduplicate Packages
      action: roadiehq:utils:jsonata
      input:
        data:
          existing: ${{ steps['parse-existing-packages'].output.content.packages | default([]) }}
          new: ${{ parameters.packages | default([]) }}
        # Concatenate existing + new packages and drop duplicates
        expression: "$distinct($append(existing, new))"

    - id: render-packages
      name: Render Complete Packages File
      action: fetch:template:file
      input:
        url: ./template/packages.yaml
        targetPath: ./packages.yaml
        values:
          packages: ${{ steps['combine-packages'].output.result | default([]) }}

    - id: fetch-existing-users
      name: Fetch Existing Users
      action: fetch:plain:file
      input:
        url: https://github.com/stuttgart-things/harvester/blob/main/packer/dev/${{ steps['resolve-target'].output.result.devName }}/users.yaml
        targetPath: ./users-existing.yaml

    - id: parse-existing-users
      name: Parse Existing Users
      action: utils:yaml:parse
      input:
        filePath: ./users-existing.yaml

    - id: combine-users
      name: Merge & Deduplicate Users
      action: roadiehq:utils:jsonata
      input:
        data:
          existing: ${{ steps['parse-existing-users'].output.content.users | default([]) }}
          new: ${{ parameters.users | default([]) }}
        # Keep existing users whose name is NOT re-submitted, then append the
        # new ones — so a re-submitted username updates instead of duplicating.
        expression: "$append(existing[$not(name in new.name)], new)"

    - id: render-users
      name: Render Complete Users File
      action: fetch:template:file
      input:
        url: ./template/users-additions.yaml
        targetPath: ./users.yaml
        values:
          users: ${{ steps['combine-users'].output.result | default([]) }}

    - id: render-catalog
      name: Render Catalog Info
      action: fetch:template:file
      input:
        url: ./template/catalog-info.yaml
        targetPath: ./catalog-info.yaml
        values:
          users: ${{ parameters.users }}
          packages: ${{ parameters.packages }}
          baseImage: ${{ parameters.baseImage }}
          goldenBase: ${{ steps['resolve-target'].output.result.goldenBase }}
          targetName: ${{ steps['resolve-target'].output.result.devName }}

    - id: create-pull-request
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=stuttgart-things&repo=harvester
        branchName: backstage/update-${{ steps['resolve-target'].output.result.devName }}-${{ user.entity.metadata.name | default('anon') }}-config
        update: true
        title: "Update ${{ steps['resolve-target'].output.result.devName }} dev image config"
        description: |
          ## Dev Image Config Update (${{ steps['resolve-target'].output.result.devName }})

          Self-service update via Backstage — layered on golden `${{ steps['resolve-target'].output.result.goldenBase }}`.

          Auto-merges on a green build.
        targetPath: packer/dev/${{ steps['resolve-target'].output.result.devName }}

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/stuttgart-things/harvester/blob/main/packer/dev/${{ steps['resolve-target'].output.result.devName }}/catalog-info.yaml
        optional: true

  output:
    links:
      - title: Pull Request
        icon: github
        url: ${{ steps['create-pull-request'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: Next Steps
        content: |
          PR created at ${{ steps['create-pull-request'].output.remoteUrl }}
          The packer build pipeline triggers automatically and, on success, the
          PR auto-merges and the `${{ steps['resolve-target'].output.result.devName }}` image is uploaded to Harvester.
      - title: Catalog Resource Preview
        content: | #pragma: allowlist secret
          ## Catalog Entity

          | Field | Value |
          |-------|-------|
          | **Name** | ${{ steps['resolve-target'].output.result.devName }}-packer-image |
          | **Kind** | Resource |
          | **Type** | packer-image-dev |
          | **Lifecycle** | experimental |
          | **Owner** | platform-team |
          | **Base Image** | ${{ parameters.baseImage }} |
          | **Golden Base** | ${{ steps['resolve-target'].output.result.goldenBase }} |

          ## Users

          ${{ 'No new users added.' if not parameters.users else '' }}
          {%- for user in parameters.users %}
          ### ${{ user.name }}

          | Setting | Value |
          |---------|-------|
          | **Groups** | ${{ user.groups or 'sudo' }} |
          | **Shell** | ${{ user.shell or '/bin/bash' }} |
          | **Sudo** | ${{ user.sudo or 'ALL=(ALL) NOPASSWD:ALL' }} | # pragma: allowlist secret
          | **SSH Keys** | ${{ user.ssh_authorized_keys | length }} key(s) |
          {%- for key in user.ssh_authorized_keys %}
          - `${{ key[:50] }}...`
          {%- endfor %}

          {%- endfor %}

          ## Packages

          ${{ 'No new packages added.' if not parameters.packages else '' }}
          {%- if parameters.packages %}
          | # | Package |
          |---|---------|
          {%- for pkg in parameters.packages %}
          | ${{ loop.index }} | `${{ pkg }}` |
          {%- endfor %}
          {%- endif %}
