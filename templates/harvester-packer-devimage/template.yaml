apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: harvester-packer-devimage
  title: Create Harvester VM-Template
  description: Add packages and users to a dev packer image and create a PR to trigger the build pipeline
  tags:
    - harvester
    - packer
    - infrastructure
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Base Image
      properties:
        baseImage:
          title: Base Image
          type: string
          description: >-
            Select the golden base the dev image layers on. The dev build
            installs only the delta (your keys + extra packages) on top of it.
          enum:
            - ubuntu26
            - rocky
            - leap
          enumNames:
            - 🟠 Ubuntu 26.04 LTS (golden sthings-u26)
            - 🪨 Rocky Linux 9 (golden sthings-rocky9)
            - 🦎 openSUSE Leap 15.6 (golden sthings-leap)
          default: ubuntu26

    - title: Add New Users
      description: |
        Existing users on the dev image will be preserved.
      properties:
        users:
          title: Add New Users
          type: array
          description: >-
            Optional — leave empty to change nothing. New users to add to the
            image (existing users are preserved).
            [Browse current dev images](https://github.com/stuttgart-things/harvester/tree/main/packer/dev).
          default: []
          items:
            type: object
            required: [name, ssh_authorized_keys]
            properties:
              name:
                title: Username
                type: string
              groups:
                title: Groups
                type: string
                default: sudo
              shell:
                title: Shell
                type: string
                default: /bin/bash
              sudo:
                title: Sudo rule
                type: string
                default: "ALL=(ALL) NOPASSWD:ALL" # pragma: allowlist secret
              ssh_authorized_keys:
                title: SSH Public Keys
                type: array
                description: SSH public keys for authorized access
                items:
                  type: string
                minItems: 1
          ui:options:
            addable: true
            orderable: false
            removable: true

    - title: Additional Packages
      description: |
        Existing packages on the dev image will be preserved.
      properties:
        packages:
          title: Additional Packages
          type: array
          description: >-
            Optional — leave empty to change nothing. New packages to add to the
            image (existing packages are preserved).
            [Browse current dev images](https://github.com/stuttgart-things/harvester/tree/main/packer/dev).
          default: []
          items:
            type: string
          ui:options:
            addable: true
            orderable: false
            removable: true

  steps:
    - id: resolve-names
      name: Resolve Image Names
      action: roadiehq:utils:jsonata
      input:
        data:
          baseImage: ${{ parameters.baseImage }}
          golden:
            ubuntu26: sthings-u26
            rocky: sthings-rocky9
            leap: sthings-leap
          dev:
            ubuntu26: u26-dev
            rocky: rocky9-dev
            leap: leap-dev
          distroTags:
            ubuntu26: [ubuntu26]
            rocky: [rocky]
            leap: [opensuse, leap]
          profileBase:
            ubuntu26: ubuntu26
            rocky: rocky9
            leap: leap15
        # Resolve the golden base + dev target dir for the selected image.
        expression: |
          {
            "goldenName": $lookup(golden, baseImage),
            "devName": $lookup(dev, baseImage),
            "distroTags": $lookup(distroTags, baseImage),
            "profileBase": $lookup(profileBase, baseImage)
          }

    - id: fetch-existing-packages
      name: Fetch Existing Packages
      action: fetch:plain:file
      input:
        url: https://github.com/stuttgart-things/harvester/blob/main/packer/dev/${{ steps['resolve-names'].output.result.devName }}/packages.yaml
        targetPath: ./packages-existing.yaml

    - id: parse-existing-packages
      name: Parse Existing Packages
      action: utils:yaml:parse
      input:
        filePath: ./packages-existing.yaml

    - id: combine-packages
      name: Merge & Deduplicate Packages
      action: roadiehq:utils:jsonata
      input:
        data:
          existing: ${{ steps['parse-existing-packages'].output.content.packages | default([]) }}
          new: ${{ parameters.packages | default([]) }}
        # Concatenate existing + new packages and drop duplicates
        expression: "$distinct($append(existing, new))"

    - id: render-packages
      name: Render Complete Packages File
      action: fetch:template:file
      input:
        url: ./template/packages.yaml
        targetPath: ./packages.yaml
        values:
          packages: ${{ steps['combine-packages'].output.result | default([]) }}

    - id: fetch-existing-users
      name: Fetch Existing Users
      action: fetch:plain:file
      input:
        url: https://github.com/stuttgart-things/harvester/blob/main/packer/dev/${{ steps['resolve-names'].output.result.devName }}/users.yaml
        targetPath: ./users-existing.yaml

    - id: parse-existing-users
      name: Parse Existing Users
      action: utils:yaml:parse
      input:
        filePath: ./users-existing.yaml

    - id: combine-users
      name: Merge & Deduplicate Users
      action: roadiehq:utils:jsonata
      input:
        data:
          existing: ${{ steps['parse-existing-users'].output.content.users | default([]) }}
          new: ${{ parameters.users | default([]) }}
        # Keep existing users whose name is NOT re-submitted, then append the
        # new ones — so a re-submitted username updates instead of duplicating.
        expression: "$append(existing[$not(name in new.name)], new)"

    - id: render-users
      name: Render Complete Users File
      action: fetch:template:file
      input:
        url: ./template/users-additions.yaml
        targetPath: ./users.yaml
        values:
          users: ${{ steps['combine-users'].output.result | default([]) }}

    - id: render-pkrvars
      name: Render Packer Var-File
      action: fetch:template:file
      input:
        url: ./template/build.pkrvars.hcl
        targetPath: ./build.pkrvars.hcl
        values:
          goldenName: ${{ steps['resolve-names'].output.result.goldenName }}
          devName: ${{ steps['resolve-names'].output.result.devName }}

    - id: render-catalog
      name: Render Catalog Info
      action: fetch:template:file
      input:
        url: ./template/catalog-info.yaml
        targetPath: ./catalog-info.yaml
        values:
          users: ${{ parameters.users }}
          packages: ${{ parameters.packages }}
          goldenName: ${{ steps['resolve-names'].output.result.goldenName }}
          devName: ${{ steps['resolve-names'].output.result.devName }}
          distroTags: ${{ steps['resolve-names'].output.result.distroTags }}
          profileBase: ${{ steps['resolve-names'].output.result.profileBase }}

    - id: create-pull-request
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=stuttgart-things&repo=harvester
        branchName: backstage/dev-${{ steps['resolve-names'].output.result.devName }}-${{ user.entity.metadata.name | default('anon') }}-config
        update: true
        title: "Update dev image ${{ steps['resolve-names'].output.result.devName }} (packer)"
        description: |
          ## Dev Packer Image Update (${{ steps['resolve-names'].output.result.devName }})

          Self-service dev image layered on golden `${{ steps['resolve-names'].output.result.goldenName }}`.
          Updated via Backstage software template.

          On a green build + upload, `packer-pr-build.yml` auto-merges this PR
          (unless it also touches a golden image, which forces review).
        targetPath: packer/dev/${{ steps['resolve-names'].output.result.devName }}

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/stuttgart-things/harvester/blob/main/packer/dev/${{ steps['resolve-names'].output.result.devName }}/catalog-info.yaml
        optional: true

  output:
    links:
      - title: Pull Request
        icon: github
        url: ${{ steps['create-pull-request'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: Next Steps
        content: |
          PR created at ${{ steps['create-pull-request'].output.remoteUrl }}
          The packer build pipeline (packer-pr-build.yml) builds + uploads the
          dev image to Harvester, then auto-merges the PR on success.
      - title: Catalog Resource Preview
        content: | #pragma: allowlist secret
          ## Catalog Entity

          | Field | Value |
          |-------|-------|
          | **Name** | ${{ steps['resolve-names'].output.result.devName }}-packer-image |
          | **Kind** | Resource |
          | **Type** | packer-image-dev |
          | **Lifecycle** | experimental |
          | **Owner** | platform-team |
          | **Golden Base** | ${{ steps['resolve-names'].output.result.goldenName }} |

          ## Users

          ${{ 'No new users added.' if not parameters.users else '' }}
          {%- for user in parameters.users %}
          ### ${{ user.name }}

          | Setting | Value |
          |---------|-------|
          | **Groups** | ${{ user.groups or 'sudo' }} |
          | **Shell** | ${{ user.shell or '/bin/bash' }} |
          | **Sudo** | ${{ user.sudo or 'ALL=(ALL) NOPASSWD:ALL' }} | # pragma: allowlist secret
          | **SSH Keys** | ${{ user.ssh_authorized_keys | length }} key(s) |
          {%- for key in user.ssh_authorized_keys %}
          - `${{ key[:50] }}...`
          {%- endfor %}

          {%- endfor %}

          ## Packages

          ${{ 'No new packages added.' if not parameters.packages else '' }}
          {%- if parameters.packages %}
          | # | Package |
          |---|---------|
          {%- for pkg in parameters.packages %}
          | ${{ loop.index }} | `${{ pkg }}` |
          {%- endfor %}
          {%- endif %}
