---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: ${{ values.targetName }}-packer-image
  description: ${{ values.targetName }} self-service dev/playground Packer image, layered on golden ${{ values.goldenBase }}
  annotations:
    github.com/project-slug: stuttgart-things/harvester
  tags:
    - harvester
    - packer
    - dev
    - playground
    - ${{ values.baseImage }}
{%- if values.users | length > 0 %}
    - users-customized
{%- endif %}
{%- if values.packages | length > 0 %}
    - packages-customized
{%- endif %}
spec:
  type: packer-image-dev
  lifecycle: experimental
  owner: platform-team
  dependsOn:
    - resource:default/${{ values.goldenBase }}-packer-image
  profile:
    baseImage: ${{ values.baseImage }}
    goldenBase: ${{ values.goldenBase }}
{%- if values.users | length > 0 %}
    addedUsers:
{%- for user in values.users %}
      - ${{ user.name }}
{%- endfor %}
{%- endif %}
{%- if values.packages | length > 0 %}
    addedPackages:
{%- for pkg in values.packages %}
      - ${{ pkg }}
{%- endfor %}
{%- endif %}
